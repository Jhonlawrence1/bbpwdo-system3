databases:
  - name: pwdwebsite
    plan: free

services:
  - type: web
    name: pwd-website
    region: oregon
    plan: free
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pwdwebsite
          property: connectionString