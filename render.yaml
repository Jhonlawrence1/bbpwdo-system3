database:
  name: pwdwebsite
  ipAllowList: []
  plan: free

services:
  - name: pwd-website
    region: oregon
    plan: free
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    staticPublishPath: .
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pwdwebsite
          property: connectionString